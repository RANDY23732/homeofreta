<!DOCTYPE html>
<html>
<head>
    <title>Products Test</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0a0e17; color: white; padding: 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .product-card { background: #111827; border-radius: 10px; padding: 15px; border: 1px solid #e63946; }
        .product-card h3 { color: #e63946; }
        .price { font-size: 20px; font-weight: bold; color: #22c55e; }
        button { background: #e63946; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Our Products (from MySQL Database)</h1>
    <div id="productGrid" class="product-grid">Loading...</div>

    <script>
        fetch('http://localhost/home-of-reta-backend/api/products/get_products.php')
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    const grid = document.getElementById('productGrid');
                    grid.innerHTML = '';
                    data.products.forEach(product => {
                        grid.innerHTML += `
                            <div class="product-card">
                                <h3>${product.name}</h3>
                                <p>${product.description || 'Premium supplement'}</p>
                                <div class="price">$${product.price}</div>
                                <p>📦 Stock: ${product.stock}</p>
                                <p>⭐ Rating: ${product.rating}/5</p>
                                <p>📂 Category: ${product.category}</p>
                                <button onclick="addToCart(${product.id})">Add to Cart</button>
                            </div>
                        `;
                    });
                } else {
                    document.getElementById('productGrid').innerHTML = 'Error loading products';
                }
            })
            .catch(error => {
                document.getElementById('productGrid').innerHTML = 'Error: ' + error;
            });

        function addToCart(productId) {
            alert('Product ' + productId + ' added to cart!');
        }
    </script>
</body>
</html>
